version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: h3x_licensing
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:mariadb://mariadb:3306/h3x_licensing
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_VALIDATION_API_KEY: ${APP_VALIDATION_API_KEY}
      APP_REGISTRATION_ENABLED: ${APP_REGISTRATION_ENABLED:-false}
      APP_SECURITY_API_MAX_REQUESTS_PER_MINUTE: ${APP_SECURITY_API_MAX_REQUESTS_PER_MINUTE:-120}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM}
      APP_SUPPORT_MAIL: ${APP_SUPPORT_MAIL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  mariadb_data:

