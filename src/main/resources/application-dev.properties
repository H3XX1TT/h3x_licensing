server.servlet.session.cookie.secure=false

spring.datasource.url=jdbc:h2:mem:h3xlicensing;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.thymeleaf.cache=false

management.endpoint.health.show-details=always

app.bootstrap.enabled=true
app.bootstrap.admin-email=admin@h3x.local
app.bootstrap.admin-password=Admin123!
app.bootstrap.admin-name=H3X Admin
app.security.auth.registration-enabled=true
app.security.api.validation-key=dev-validation-key-change-me
app.security.api.max-requests-per-minute=120

spring.security.oauth2.client.registration.discord.client-id=dev-placeholder
spring.security.oauth2.client.registration.discord.client-secret=dev-placeholder

