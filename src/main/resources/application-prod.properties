server.servlet.session.cookie.secure=true

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}

spring.h2.console.enabled=false
spring.thymeleaf.cache=true

management.endpoint.health.show-details=never

app.bootstrap.enabled=false
app.security.auth.registration-enabled=${APP_REGISTRATION_ENABLED:false}
app.security.api.validation-key=${APP_VALIDATION_API_KEY}
app.security.api.max-requests-per-minute=${APP_SECURITY_API_MAX_REQUESTS_PER_MINUTE:120}

