<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password · H3X Licensing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
<div class="mx-auto flex min-h-screen max-w-7xl items-center justify-center px-6 py-12">
    <div class="glass-card w-full max-w-md rounded-3xl border border-slate-800 p-8">
        <a href="/login" class="text-sm font-semibold text-cyan-300">← Back to login</a>
        <h1 class="mt-6 text-3xl font-black">Set a new password</h1>
        <p class="mt-2 text-sm text-slate-300">Create a new password for your account.</p>

        <div th:if="${errorMessage}" class="mt-6 rounded-2xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200" th:text="${errorMessage}"></div>

        <form th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="mt-6 space-y-4">
            <input th:field="*{token}" type="hidden">
            <div>
                <label for="password" class="mb-2 block text-sm font-semibold">New password</label>
                <input id="password" th:field="*{password}" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 focus:border-cyan-400">
            </div>
            <div>
                <label for="confirmPassword" class="mb-2 block text-sm font-semibold">Confirm password</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 focus:border-cyan-400">
            </div>
            <button type="submit" class="w-full rounded-2xl bg-cyan-500 px-4 py-3 font-bold text-slate-950 hover:bg-cyan-400">Update password</button>
        </form>
    </div>
</div>
</body>
</html>
