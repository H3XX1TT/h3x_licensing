<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · H3X Licensing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
<div class="mx-auto flex min-h-screen max-w-7xl items-center justify-center px-6 py-12">
    <div class="glass-card w-full max-w-md rounded-3xl border border-slate-800 p-8">
        <a href="/" class="text-sm font-semibold text-cyan-300">← Back to home</a>
        <h1 class="mt-6 text-3xl font-black">Sign in</h1>
        <p class="mt-2 text-sm text-slate-300">Access your buyer dashboard or the admin control panel.</p>

        <div th:if="${param.error}" class="mt-6 rounded-2xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">Invalid email or password.</div>
        <div th:if="${param.logout}" class="mt-6 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200">You have been signed out.</div>
        <div th:if="${errorMessage}" class="mt-6 rounded-2xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="mt-6 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post" class="mt-6 space-y-4">
            <div>
                <label for="username" class="mb-2 block text-sm font-semibold">Email</label>
                <input id="username" name="username" type="email" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 outline-none ring-0 transition focus:border-cyan-400">
            </div>
            <div>
                <label for="password" class="mb-2 block text-sm font-semibold">Password</label>
                <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 outline-none ring-0 transition focus:border-cyan-400">
            </div>
            <button type="submit" class="w-full rounded-2xl bg-cyan-500 px-4 py-3 font-bold text-slate-950 hover:bg-cyan-400">Login</button>
        </form>

        <a href="/oauth2/authorization/discord" class="mt-4 block w-full rounded-2xl border border-indigo-500/60 px-4 py-3 text-center font-bold text-indigo-200 hover:border-indigo-400 hover:text-indigo-100">
            Continue with Discord
        </a>

        <p class="mt-4 text-center text-sm text-slate-300">
            <a href="/forgot-password" class="font-semibold text-cyan-300">Forgot your password?</a>
        </p>

        <p class="mt-6 text-center text-sm text-slate-300">No account yet? <a href="/register" class="font-semibold text-cyan-300">Create one now</a>.</p>
    </div>
</div>
</body>
</html>
