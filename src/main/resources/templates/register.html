<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · H3X Licensing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
<div class="mx-auto flex min-h-screen max-w-7xl items-center justify-center px-6 py-12">
    <div class="glass-card w-full max-w-xl rounded-3xl border border-slate-800 p-8">
        <a href="/" class="text-sm font-semibold text-cyan-300">← Back to home</a>
        <h1 class="mt-6 text-3xl font-black">Create buyer account</h1>
        <p class="mt-2 text-sm text-slate-300">Register your customer profile and claim your purchases later from the dashboard.</p>

        <div th:if="${errorMessage}" class="mt-6 rounded-2xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${registrationForm}" method="post" class="mt-6 grid gap-4">
            <div>
                <label for="email" class="mb-2 block text-sm font-semibold">Email</label>
                <input id="email" th:field="*{email}" type="email" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 focus:border-cyan-400">
            </div>
            <div>
                <label for="displayName" class="mb-2 block text-sm font-semibold">Display name</label>
                <input id="displayName" th:field="*{displayName}" type="text" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 focus:border-cyan-400">
            </div>
            <div>
                <label for="discordId" class="mb-2 block text-sm font-semibold">Discord ID <span class="text-slate-400">(optional)</span></label>
                <input id="discordId" th:field="*{discordId}" type="text" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 focus:border-cyan-400">
            </div>
            <div>
                <label for="password" class="mb-2 block text-sm font-semibold">Password</label>
                <input id="password" th:field="*{password}" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 focus:border-cyan-400">
            </div>
            <button type="submit" class="mt-2 rounded-2xl bg-cyan-500 px-4 py-3 font-bold text-slate-950 hover:bg-cyan-400">Register account</button>
        </form>
    </div>
</div>
</body>
</html>
